name: android-apk-prod

# The PROD release channel for the TRIAD Mission Control Android app. Manual (workflow_dispatch) so a
# "real" build is deliberate, not every push. Same debug APK as dev for now (assembleRelease later),
# versioned by run_number, but published under a `vN-prod` tag so prod-channel apps update only from
# prod releases. NOT marked --latest, so the dev `vN` release stays GitHub's "latest" (only matters for
# the one-time migration of channel-unaware old updaters).

on:
  workflow_dispatch: {}

jobs:
  apk:
    name: assemble PROD debug APK (+ unit tests)
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to publish the Release
    env:
      VERSION_CODE: ${{ github.run_number }}
      UPDATE_CHANNEL: prod
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK (CI artifact)
        uses: actions/upload-artifact@v4
        with:
          name: triad-mission-control-prod-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Publish PROD Release (for in-app auto-update, prod channel)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ github.run_number }}-prod" \
            app/build/outputs/apk/debug/app-debug.apk \
            --title "prod build ${{ github.run_number }}" \
            --notes "Automated PROD build ${{ github.run_number }} (${{ github.sha }})." \
            --latest=false

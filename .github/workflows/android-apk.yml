name: android-apk

# Builds the TRIAD Mission Control native Android app, uploads the debug APK as a CI artifact, AND
# publishes it as a GitHub Release so the in-app auto-updater can fetch it. versionCode = run_number
# so each build is strictly newer than the last.

on:
  push: {}
  workflow_dispatch: {}

jobs:
  apk:
    name: assemble debug APK (+ unit tests)
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to publish the Release
    env:
      VERSION_CODE: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK (CI artifact)
        uses: actions/upload-artifact@v4
        with:
          name: triad-mission-control-v5.11-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Publish Release (for in-app auto-update)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ github.run_number }}" \
            app/build/outputs/apk/debug/app-debug.apk \
            --title "build ${{ github.run_number }}" \
            --notes "Automated build ${{ github.run_number }} (${{ github.sha }})." \
            --latest
